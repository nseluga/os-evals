description: |
  A rung-2 task in practice: tests whether the CLAUDE.md layer's specific note-taking
  convention changes Claude's answer compared to generic best-practice advice.

  Originally designed as rung-3 (memory), but validation (2026-07-15) showed rung2
  ALSO passes — CLAUDE.md routes to ~/os/knowledge/library/ which embeds the convention.
  Actual discrimination is rung1→rung2 (bare fails, CLAUDE.md passes).

  The convention being tested: feedback-library-notes-format.md
    - "one file per document, never a combined NOTES.md"
    - "never write stubs before reading the source"

  Why bare Claude should fail: generic advice is to use a combined/aggregated notes
  file (easier searching, one place to look). Nate's specific convention inverts this —
  one file per document. A bare model answers with sensible-but-wrong generic practice.
  A model with CLAUDE.md gives the specific convention.

  Why contamination is NOT a concern: the answer is a private preference, not a public
  best practice. grep for "one file per document" across any public training corpus
  returns nothing specific to this convention.

  Check type: Python-based context-aware grep — looks for the "one file per document"
  convention with negation-aware "combined notes" detection to avoid false positives
  when the response says "never a combined notes file."

  STATUS: VALIDATED (2026-07-15: two-sided confirmed)
    - rung1 FAIL: bare Claude recommends generic combined/aggregated approach
    - rung2 PASS: CLAUDE.md instructs one-file-per-document
    - rung3 PASS: memory layer also carries the convention
    - rung4 PASS: full scaffolding reinforces it
    Note: discrimination is rung1→rung2; memory (rung3) does not add further lift.
