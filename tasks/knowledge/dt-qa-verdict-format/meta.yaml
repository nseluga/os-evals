  — the VERDICT: prefix is unique to this system. Bare Claude doesn't know it.

  Why contamination is NOT a concern: the VERDICT format is specific to Nate's
  dev-team skill files; it's not documented anywhere a pre-training corpus would have.

  Check type: transcript grep — requires VERDICT: PASS/FAIL pattern and description
  of tests+behavioral as requiring more than just running the test suite.

