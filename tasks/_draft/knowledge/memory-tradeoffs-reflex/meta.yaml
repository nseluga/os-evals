description: |
  A rung-3 task: tests whether the memory entry "surface-tradeoffs-proactively" changes
  the default response pattern when giving a configuration recommendation.

  The memory entry being tested: feedback-surface-tradeoffs-proactively.md
    - "Include risks/tradeoffs with any config recommendation; user had to ask
      'are there drawbacks?' before I volunteered them."

  Why bare Claude should fail: when asked "should I enable X?", the default response
  is to answer yes/no and explain HOW to do it. Volunteering risks unprompted requires
  the explicit memory instruction. A bare model will commonly give a clean recommendation
  without surfacing downsides unless explicitly asked.

  This is NOT about general coding judgment — it's about the REFLEX to surface tradeoffs
  even when the user didn't ask. That reflex is documented in memory.

  Check type: transcript grep — verifies the response includes risk/drawback discussion
  even though the prompt does not mention asking for tradeoffs.

  Discrimination target: rung1 answer is "yes, here's how"; rung3+ answer proactively
  lists security/reliability concerns alongside the recommendation.

  STATUS: NEEDS-VALIDATION — check correctness depends on whether bare models commonly
  surface tradeoffs anyway; validate with a real bare rung1 run before scoring.
  This has the HIGHEST risk of being a non-discriminating task (false-negative).
